<svg width="12" height="11" viewBox="0 0 12 11" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Roblox ImageLabel.ImageColor3 = Accent. Achromatic texture (R=G=B) so any accent hue tints cleanly. -->
<!--
  Reference accent A0 = rgb(75, 126, 227) (Pallete.Colors.Accent). Roblox: out_chan = (k/255) * (A0_chan/255) per channel
  => out_8bit_chan = k * A0_chan / 255. One gray k can’t match two arbitrary blues exactly; we pick k that minimizes
  || k*A0 - D ||² (least squares) = orthogonal projection of target D onto line spanned by A0 in RGB:
  k = (A0·D) / (A0·A0), A0·A0 = 75²+126²+227² = 73030.

  Arcs target D1 = #133781 = (19,55,129): A0·D1 = 37638 → k1 = 37638/73030 → round(k1*255) = 131 → #838383
  Pin target D2 = #406ABF = (64,106,191): A0·D2 = 61513 → k2 = 61513/73030 → round(k2*255) = 215 → #D7D7D7

  Check pin @ ImageColor3=A0: (215*75/255, 215*126/255, 215*227/255) ≈ (63,106,191) ≈ D2.
  Arcs: best RGB compromise (not exact D1); much brighter than luminance-mapped grays.
-->
